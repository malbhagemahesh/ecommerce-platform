{% extends 'base.html' %}

{% block content %}

<h2>Your Cart</h2>

<table class="table">

<thead>

<tr>
<th>Product</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
<th></th>
</tr>

</thead>

<tbody>

{% for item in cart_items %}

<tr>

<td>{{ item.product.name }}</td>

<td>₹{{ item.product.price }}</td>

<td>{{ item.quantity }}</td>

<td>
₹{{ item.product.price|floatformat:2 }}
</td>

<td>

<a
href="/cart/remove/{{ item.id }}/"
class="btn btn-danger btn-sm">

Remove

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

<h4>

Grand Total:
₹{{ total }}

</h4>

{% endblock %}
